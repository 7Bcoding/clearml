# 方案 2 MASTER_ADDR 补法 A：fixed 模式叠加 values（hostNetwork）
# 用法:
#   helm upgrade --install clearml-agent-multinode charts/clearml-agent -n clearml \
#     -f examples/volcano-vgpu/custom_values.yaml \
#     -f /path/to/clearml/examples/volcano_vgpu/k8s/values-multinode-full-gpu.example.yaml \
#     -f /path/to/clearml/examples/volcano_vgpu/k8s/values-multinode-full-gpu-hostnetwork.example.yaml
#
# 提交:
#   python submit_multinode_podgroup.py --master-addr-mode fixed --master-addr <rank0 节点 IP>
#
# 建议: rank0 所在节点打 label multinode.master=true，本 overlay 仅调度到该节点（可选）

agentk8sglue:
  basePodTemplate:
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet
    nodeSelector:
      gpu.present: "true"
      multinode.master: "true"
