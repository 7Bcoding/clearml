# 平台参考：Volcano 多机多卡 PyTorch 分布式 Job（PodGroup gang 调度）
#
# 说明：
#   - 这是「平台侧」如何配合 Volcano gang 起多 Pod 的示例，不是算法工程师直接 kubectl apply 的文件。
#   - 当前 ClearML k8s-glue 默认 1 Task = 1 Pod；要多机，需 Agent 扩展为按 Task 超参生成类似结构。
#   - vgpuHook 需能对 Job 内每个 Pod 分别 patch volcano.sh/vgpu-* limits。
#
# 前置：Volcano 已安装；队列 volcano-queue 已配置；节点有 GPU + volcano-vgpu-device-plugin。
---
apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
  name: pytorch-multinode-example
  namespace: clearml
spec:
  minAvailable: 2          # gang：2 个 worker Pod 都就绪才一起启动
  schedulerName: volcano
  queue: volcano-queue
  plugins:
    env: []
    svc: []                # 为 Pod 0 创建 headless service，供 MASTER_ADDR 解析
  tasks:
    - replicas: 2          # 2 个节点（nnodes）
      name: worker
      template:
        metadata:
          labels:
            app: pytorch-multinode
        spec:
          restartPolicy: Never
          schedulerName: volcano
          # 建议同构 GPU 节点；4090 与 A100 不要混在同一 Job
          nodeSelector:
            accelerator: nvidia
          containers:
            - name: train
              image: nvidia/cuda:12.4.1-runtime-ubuntu22.04
              command: ["/bin/bash", "-lc"]
              args:
                - |
                  pip install -q torch clearml && \
                  torchrun \
                    --nnodes=${NNODES} \
                    --nproc_per_node=${NPROC_PER_NODE} \
                    --node_rank=${NODE_RANK} \
                    --rdzv_backend=c10d \
                    --rdzv_endpoint=${MASTER_ADDR}:${MASTER_PORT} \
                    train_multinode_entry.py
              env:
                - name: NNODES
                  value: "2"
                - name: NPROC_PER_NODE
                  value: "2"           # 每节点进程数 = 每节点 GPU 数
                - name: NODE_RANK
                  value: "0"           # 由 Volcano/启动器按 Pod 序号注入（示例写死，实际应动态）
                - name: MASTER_ADDR
                  value: "pytorch-multinode-example-worker-0"  # svc 插件提供的 DNS
                - name: MASTER_PORT
                  value: "29500"
                - name: CLEARML_TASK_ID
                  value: "<clearml-task-id>"   # Agent 注入，供 rank0 写日志
                - name: NCCL_DEBUG
                  value: "INFO"
              resources:
                limits:
                  volcano.sh/vgpu-number: "2"
                  volcano.sh/vgpu-memory: "24"   # 整卡示例；vGPU 切分按平台 factor 填 GiB
                  volcano.sh/vgpu-cores: "100"
