# 历史参考：vGPU 版 Volcano Job 多机示例（非整卡队列默认路径）
#
# 整卡多机 gang 请用:
#   k8s/volcano_job_wholecard_gang.example.yaml
#   submit_volcano_job_wholecard.py
#
# 说明:
#   - Volcano Job = K8s 原生 gang + svc 插件 MASTER_ADDR
#   - 当前 ClearML k8s-glue 默认 1 Task = 1 Pod；自动化需 Agent 扩展（方案 3b）
#   - 本文件保留 vGPU limits 供平台对照
---
apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
  name: pytorch-multinode-vgpu-example
  namespace: clearml
spec:
  minAvailable: 2
  schedulerName: volcano
  queue: volcano-queue
  plugins:
    env: []
    svc: []
  tasks:
    - replicas: 2
      name: worker
      template:
        metadata:
          labels:
            app: pytorch-multinode
        spec:
          restartPolicy: Never
          schedulerName: volcano
          nodeSelector:
            gpu.present: "true"
          containers:
            - name: train
              image: nvidia/cuda:12.4.1-runtime-ubuntu22.04
              command: ["/bin/bash", "-lc"]
              args:
                - |
                  pip install -q torch clearml && \
                  python /app/train_volcano_job_smoke.py
              env:
                - name: NNODES
                  value: "2"
                - name: MASTER_ADDR
                  value: "pytorch-multinode-vgpu-example-worker-0"
                - name: MASTER_PORT
                  value: "29500"
                - name: CLEARML_TASK_ID
                  value: "<clearml-task-id>"
                - name: NCCL_DEBUG
                  value: "INFO"
              resources:
                limits:
                  volcano.sh/vgpu-number: "1"
                  volcano.sh/vgpu-memory: "24"
                  volcano.sh/vgpu-cores: "100"
