# 方案 2 PodGroup —— HAMi/vGPU 集群版（节点 nvidia.com/gpu=0 时用本文件）
#
# 与 podgroup_clearml_gang_full_2.example.yaml 的区别：minResources 用 volcano.sh/vgpu-number，
# 否则 gang 以 nvidia.com/gpu 计资源（集群=0）→ minResources 永远不满足，PodGroup 一直 not ready。
#
# kubectl apply -f k8s/podgroup_clearml_gang_full_2_vgpu.example.yaml
#
# 扩到 4 节点: 复制改 minMember/minResources，并同步 values 注解 group-name 与 submit --num-nodes
---
apiVersion: scheduling.volcano.sh/v1beta1
kind: PodGroup
metadata:
  name: clearml-gang-full-2
  namespace: clearml
spec:
  queue: multinode-full-gpu
  minMember: 2
  minResources:
    cpu: "16"
    memory: 64Gi
    volcano.sh/vgpu-number: "2"
