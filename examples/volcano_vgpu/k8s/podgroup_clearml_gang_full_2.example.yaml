# 方案 2：2 节点整卡 PodGroup gang（minMember=2）
# kubectl apply -f k8s/podgroup_clearml_gang_full_2.example.yaml
#
# 扩到 4 节点: 复制为 clearml-gang-full-4，改 minMember/minResources，并同步改 values 注解 group-name
---
apiVersion: scheduling.volcano.sh/v1beta1
kind: PodGroup
metadata:
  name: clearml-gang-full-2
  namespace: clearml
spec:
  queue: multinode-full-gpu
  minMember: 2
  minResources:
    cpu: "16"
    memory: 64Gi
    nvidia.com/gpu: "2"
