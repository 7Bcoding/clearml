# 整卡多机 Agent 专用 values（不要与 examples/volcano-vgpu/custom_values.yaml 叠加！）
#
# custom_values 含 vGPU 默认 limits/annotations；Helm 深合并后会与整卡 nvidia.com/gpu 叠在一起，
# 导致 Pod 同时申请整卡 + vGPU，Volcano 报 Unschedulable。
#
# 正确部署（仅本文件 + 凭证/URL 按环境改）:
#   helm upgrade --install clearml-agent-multinode charts/clearml-agent -n clearml \
#     -f /path/to/values-multinode-full-gpu.standalone.example.yaml
#
# 若必须引用 custom_values 里的 URL，请复制 URL 到本文件，不要 -f custom_values.yaml

clearml:
  existingAgentk8sglueSecret: "clearml-agent-creds"

agentk8sglue:
  image:
    repository: "allegroai/clearml-agent-k8s-base"
    tag: "1.24-21"

  apiServerUrlReference: "http://10.10.36.6:30008"
  fileServerUrlReference: "http://10.10.36.6:30081"
  webServerUrlReference: "http://10.10.36.6:30080"
  clearmlcheckCertificate: false

  queue: multinode-full-gpu
  createQueueIfNotExists: false
  defaultContainerImage: nvidia/cuda:12.4.1-runtime-ubuntu22.04

  vgpuHook:
    enabled: false

  extraEnvs:
    - name: "CLEARML_AGENT_NO_UPDATE"
      value: "true"

  basePodTemplate:
    schedulerName: volcano
    runtimeClassName: nvidia

    # 方案 1 不要 group-name；方案 2 再单独加 annotations
    annotations: {}

    resources:
      limits:
        nvidia.com/gpu: "1"
      requests:
        cpu: "8"
        memory: 32Gi
        nvidia.com/gpu: "1"

    env:
      - name: CLEARML_MULTI_NODE_MASTER_DEF_ADDR
        valueFrom:
          fieldRef:
            fieldPath: status.podIP
      - name: NCCL_DEBUG
        value: "INFO"
      - name: NCCL_IB_DISABLE
        value: "1"
      - name: NCCL_SOCKET_IFNAME
        value: "eth0"

    nodeSelector:
      gpu.present: "true"

    volumes:
      - name: clearml-cache
        hostPath:
          path: /data/clearml-cache
          type: DirectoryOrCreate
    volumeMounts:
      - name: clearml-cache
        mountPath: /root/.clearml
