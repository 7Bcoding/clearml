# Volcano Queue：整卡多机（方案 1 / 2 / 3 共用）
# kubectl apply -f k8s/volcano_queue_multinode_full_gpu.example.yaml
# kubectl get queue multinode-full-gpu
---
apiVersion: scheduling.volcano.sh/v1beta1
kind: Queue
metadata:
  name: multinode-full-gpu
spec:
  weight: 1
  reclaimable: true
  capability:
    cpu: "32"
    memory: 128Gi
    nvidia.com/gpu: "4"
