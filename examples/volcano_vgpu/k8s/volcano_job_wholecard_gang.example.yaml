# 方案 3：整卡多机 Volcano Job gang 冒烟（静态模板）
#
# 推荐用 submit_volcano_job_wholecard.py 自动生成 Job 名 / ConfigMap / ClearML Task。
# 本文件供手工 kubectl apply 或 CI 参考。
#
# 手工步骤:
#   1. 替换 <JOB_NAME>、<CLEARML_TASK_ID>、<CONFIGMAP_NAME>
#   2. kubectl create configmap <CONFIGMAP_NAME> -n clearml \
#        --from-file=train_volcano_job_smoke.py=../train_volcano_job_smoke.py
#   3. kubectl apply -f volcano_job_wholecard_gang.example.yaml
#
# MASTER_ADDR = <JOB_NAME>-worker-0 （Volcano svc 插件 DNS，Job 内短主机名）
# NODE_RANK   = VK_TASK_INDEX       （Volcano env 插件，train_volcano_job_smoke.py 读取）
---
apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
  name: clearml-vjob-smoke-example
  namespace: clearml
  labels:
    app: clearml-volcano-job-smoke
    clearml-scheme: "3"
spec:
  minAvailable: 2
  schedulerName: volcano
  queue: multinode-full-gpu
  plugins:
    env: []
    svc: []
  tasks:
    - replicas: 2
      name: worker
      template:
        metadata:
          labels:
            app: clearml-volcano-job-smoke
        spec:
          restartPolicy: Never
          schedulerName: volcano
          runtimeClassName: nvidia
          nodeSelector:
            gpu.present: "true"
          volumes:
            - name: smoke-script
              configMap:
                name: clearml-vjob-smoke-example-script
          containers:
            - name: train
              image: nvidia/cuda:12.4.1-runtime-ubuntu22.04
              command: ["/bin/bash", "-lc"]
              args:
                - |
                  set -e
                  pip install -q clearml==2.1.8 torch==2.5.1 \
                    --extra-index-url https://download.pytorch.org/whl/cu124
                  python /app/train_volcano_job_smoke.py
              env:
                - name: NNODES
                  value: "2"
                - name: MASTER_ADDR
                  value: "clearml-vjob-smoke-example-worker-0"
                - name: MASTER_PORT
                  value: "29500"
                - name: CLEARML_TASK_ID
                  value: "<clearml-task-id>"
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: NCCL_IB_DISABLE
                  value: "1"
                - name: NCCL_SOCKET_IFNAME
                  value: "eth0"
              resources:
                limits:
                  nvidia.com/gpu: "1"
                requests:
                  cpu: "8"
                  memory: 32Gi
                  nvidia.com/gpu: "1"
              volumeMounts:
                - name: smoke-script
                  mountPath: /app
